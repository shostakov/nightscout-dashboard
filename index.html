<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGM Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js + date adapter -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #02080a;
      background-image:
        radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 90% 90%, rgba(13, 148, 136, 0.12) 0%, transparent 60%);
      background-attachment: fixed;
    }

    /* Animated shimmer overlay */
    .shimmer-layer {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        -45deg,
        transparent 35%,
        rgba(16, 185, 129, 0.04) 45%,
        rgba(105, 246, 184, 0.07) 50%,
        rgba(16, 185, 129, 0.04) 55%,
        transparent 65%
      );
      background-size: 400% 400%;
      animation: shimmer 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; opacity: 0.5; }
      50%  { background-position: 100% 50%; opacity: 1; }
      100% { background-position: 0% 50%; opacity: 0.5; }
    }

    /* Glassmorphic cards */
    .glass-card {
      background: rgba(13, 22, 33, 0.45);
      backdrop-filter: blur(80px);
      -webkit-backdrop-filter: blur(80px);
      border: 1px solid rgba(105, 246, 184, 0.08);
      border-radius: 1.5rem;
    }

    /* Large glucose number glow */
    .glucose-glow {
      filter: drop-shadow(0 0 30px currentColor);
    }

    /* Period button states */
    .period-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.5rem 1.1rem;
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .period-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: #e2e8f0;
    }
    .period-btn.active {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.4);
      color: #6ee7b7;
      box-shadow: 0 0 16px rgba(16, 185, 129, 0.2);
    }

    /* Axis label font */
    .axis-label {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Stale data badge */
    .stale-badge {
      display: none;
      color: #fbbf24;
      font-size: 0.75rem;
    }
    .stale-badge.visible {
      display: inline;
    }

    /* TIR sorted-gradient bar */
    .tir-bar-fill {
      height: 100%;
      width: 100%;
      border-radius: 8px;
      transition: box-shadow 0.3s;
    }
  </style>
</head>

<body class="h-screen overflow-hidden text-slate-100">
  <!-- Shimmer background layer -->
  <div class="shimmer-layer"></div>

  <!-- Main content -->
  <main class="relative z-10 w-full max-w-[1440px] mx-auto px-4 sm:px-8 py-6 sm:py-8 flex flex-col gap-5 h-full">

    <!-- Top row: Current Glucose + Time in Range -->
    <div class="flex flex-col md:flex-row gap-5">

      <!-- Current Glucose card -->
      <div class="p-7 md:p-10 flex flex-col justify-between md:basis-3/5">
        <span class="uppercase tracking-[0.2em] text-xs font-bold text-slate-400" style="font-family:'Space Grotesk',sans-serif;">Current Glucose</span>
        <div class="flex items-end gap-5 mt-3 flex-wrap">
          <!-- Big number -->
          <div class="flex items-baseline gap-3">
            <span id="sgv-value" class="glucose-glow font-extrabold leading-none" style="font-family:'Space Grotesk',sans-serif; font-size: clamp(5rem, 18vw, 11rem); color: #10B981;">--</span>
            <span class="text-slate-400 font-semibold" style="font-size: clamp(1rem, 3vw, 1.75rem);">mg/dL</span>
          </div>
          <!-- Trend -->
          <div class="flex flex-col mb-1">
            <span id="trend-arrow" class="font-bold leading-none" style="font-size: clamp(1.5rem, 4vw, 2.5rem); color: #10B981;">→</span>
            <span id="trend-label" class="text-slate-400 text-sm mt-1" style="font-family:'Space Grotesk',sans-serif;">Stable</span>
          </div>
        </div>
        <div class="mt-3 flex items-center gap-3 text-xs text-slate-500" style="font-family:'Space Grotesk',sans-serif;">
          <span id="last-updated">--</span>
          <span id="stale-badge" class="stale-badge">⚠ Stale data</span>
        </div>
      </div>

      <!-- Time in Range card -->
      <div class="glass-card p-7 md:p-10 flex flex-col md:basis-2/5 min-h-[180px]">
        <div class="flex justify-between items-start">
          <div>
            <span class="uppercase tracking-[0.2em] text-xs font-bold text-slate-400" style="font-family:'Space Grotesk',sans-serif;">Time in Range</span>
            <p class="text-slate-300 text-sm mt-1" style="font-family:'Space Grotesk',sans-serif;">Target: 70–180 mg/dL</p>
          </div>
          <span id="tir-value" class="font-black leading-none" style="font-family:'Space Grotesk',sans-serif; font-size: clamp(3rem, 8vw, 5rem); color: #10B981;">--%</span>
        </div>
        <div class="flex-1 flex items-center">
          <div class="w-full">
            <div style="position:relative; padding:28px 0 0;">
              <!-- Solid green backing bar showing the in-range zone; sits behind gradient bar -->
              <div id="tir-range-bg" style="position:absolute;top:20px;height:72px;border-radius:10px;background:rgba(16,185,129,0.5);box-shadow:0 0 0 3px rgba(16,185,129,0.5);display:none;"></div>
              <!-- position:relative so this stacks above the absolute backing bar via DOM order -->
              <div class="h-14 w-full overflow-hidden" style="position:relative;border-radius:8px;box-shadow:0 0 0 3px rgba(255,255,255,0.85);">
                <div id="tir-bar" class="tir-bar-fill"></div>
              </div>
              <!-- Range boundary labels, positioned by JS -->
              <div id="label-lo" style="position:absolute;top:2px;transform:translateX(-50%);font-size:0.7rem;font-weight:700;color:#10B981;display:none;text-shadow:0 0 8px #10B981;" class="font-mono">70</div>
              <div id="label-hi" style="position:absolute;top:2px;transform:translateX(-50%);font-size:0.7rem;font-weight:700;color:#10B981;display:none;text-shadow:0 0 8px #10B981;" class="font-mono">180</div>
            </div>
          </div>
        </div>
        <div class="flex justify-between text-xs text-slate-500 mt-auto pt-4" style="font-family:'Space Grotesk',sans-serif;">
          <span>In range</span>
          <span id="tir-period">Last 3h</span>
        </div>
      </div>
    </div>

    <!-- Bottom row: Period buttons + Chart -->
    <div class="flex flex-row gap-5 flex-1 min-h-0">
      <!-- Period selector card -->
      <div class="glass-card px-4 py-6 flex flex-col justify-center gap-2">
        <button class="period-btn" data-hours="1">1h</button>
        <button class="period-btn active" data-hours="3">3h</button>
        <button class="period-btn" data-hours="6">6h</button>
        <button class="period-btn" data-hours="12">12h</button>
        <button class="period-btn" data-hours="24">24h</button>
      </div>
      <!-- Chart card -->
      <div class="glass-card p-5 sm:p-8 flex-1 min-h-0 relative" id="chart-card">
        <canvas id="glucoseChart"></canvas>
        <canvas id="lightning-overlay" style="position:absolute;pointer-events:none;top:0;left:0;"></canvas>
      </div>
    </div>

  </main>

  <script>
    // ─── Color System ────────────────────────────────────────────────────────────

    const COLOR_STOPS = [
      { value: 60,  r: 59,  g: 130, b: 246 },  // cool blue
      { value: 80,  r: 16,  g: 185, b: 129 },  // emerald
      { value: 140, r: 217, g: 249, b: 157 },  // greenish-yellow
      { value: 180, r: 249, g: 115, b: 22  },  // orange
      { value: 250, r: 225, g: 29,  b: 72  },  // ruby red
      { value: 400, r: 100, g: 0,   b: 20  },  // dark crimson
    ];
    const BELOW_40 = { r: 192, g: 38, b: 211 }; // red-violet (Low)

    function lerp(a, b, t) { return Math.round(a + (b - a) * t); }

    function glucoseColor(sgv) {
      if (sgv == null) return 'rgb(148, 163, 184)';
      // ≤40 = red-violet; 40→60 interpolates to cool blue
      if (sgv <= 40) return `rgb(${BELOW_40.r}, ${BELOW_40.g}, ${BELOW_40.b})`;
      if (sgv < 60) {
        const t = (sgv - 40) / 20;
        return `rgb(${lerp(BELOW_40.r, COLOR_STOPS[0].r, t)}, ${lerp(BELOW_40.g, COLOR_STOPS[0].g, t)}, ${lerp(BELOW_40.b, COLOR_STOPS[0].b, t)})`;
      }
      const last = COLOR_STOPS[COLOR_STOPS.length - 1];
      if (sgv >= last.value) return `rgb(${last.r}, ${last.g}, ${last.b})`;
      for (let i = 0; i < COLOR_STOPS.length - 1; i++) {
        const lo = COLOR_STOPS[i], hi = COLOR_STOPS[i + 1];
        if (sgv >= lo.value && sgv < hi.value) {
          const t = (sgv - lo.value) / (hi.value - lo.value);
          return `rgb(${lerp(lo.r, hi.r, t)}, ${lerp(lo.g, hi.g, t)}, ${lerp(lo.b, hi.b, t)})`;
        }
      }
      return `rgb(${last.r}, ${last.g}, ${last.b})`;
    }

    function glucoseColorAlpha(sgv, alpha) {
      if (sgv == null) return `rgba(148, 163, 184, ${alpha})`;
      if (sgv <= 40) return `rgba(${BELOW_40.r}, ${BELOW_40.g}, ${BELOW_40.b}, ${alpha})`;
      if (sgv < 60) {
        const t = (sgv - 40) / 20;
        return `rgba(${lerp(BELOW_40.r, COLOR_STOPS[0].r, t)}, ${lerp(BELOW_40.g, COLOR_STOPS[0].g, t)}, ${lerp(BELOW_40.b, COLOR_STOPS[0].b, t)}, ${alpha})`;
      }
      const last = COLOR_STOPS[COLOR_STOPS.length - 1];
      if (sgv >= last.value) return `rgba(${last.r}, ${last.g}, ${last.b}, ${alpha})`;
      for (let i = 0; i < COLOR_STOPS.length - 1; i++) {
        const lo = COLOR_STOPS[i], hi = COLOR_STOPS[i + 1];
        if (sgv >= lo.value && sgv < hi.value) {
          const t = (sgv - lo.value) / (hi.value - lo.value);
          return `rgba(${lerp(lo.r, hi.r, t)}, ${lerp(lo.g, hi.g, t)}, ${lerp(lo.b, hi.b, t)}, ${alpha})`;
        }
      }
      return `rgba(${last.r}, ${last.g}, ${last.b}, ${alpha})`;
    }

    // ─── Trend Mapping ──────────────────────────────────────────────────────────

    const TREND_MAP = {
      DoubleDown:    { arrow: '↓↓', label: 'Dropping Fast' },
      SingleDown:    { arrow: '↓',  label: 'Falling' },
      FortyFiveDown: { arrow: '↘',  label: 'Falling Slightly' },
      Flat:          { arrow: '→',  label: 'Stable' },
      FortyFiveUp:   { arrow: '↗',  label: 'Rising Slightly' },
      SingleUp:      { arrow: '↑',  label: 'Rising' },
      DoubleUp:      { arrow: '↑↑', label: 'Rising Fast' },
    };
    const TREND_FALLBACK = { arrow: '→', label: 'Stable' };

    // ─── TIR ────────────────────────────────────────────────────────────────────

    function calculateTIR(entries) {
      if (!entries.length) return null;
      const inRange = entries.filter(e => e.sgv >= 70 && e.sgv <= 180).length;
      return Math.round((inRange / entries.length) * 100);
    }

    function tirColor(pct) {
      if (pct >= 70) return '#10B981';
      if (pct >= 50) return '#F97316';
      return '#E11D48';
    }

    // ─── Chart Setup ────────────────────────────────────────────────────────────

    const GRID_VALUES = [40, 60, 80, 140, 180, 250, 400];

    const glowPlugin = {
      id: 'lineGlow',
      afterDatasetsDraw(chart) {
        const dataset = chart.data.datasets[0];
        if (!dataset.data.length) return;
        const ctx = chart.ctx;
        const meta = chart.getDatasetMeta(0);
        const pts = meta.data;
        if (pts.length < 2) return;

        // Build a gradient mapped to actual glucose colors along the x-axis
        const x0 = pts[0].x;
        const x1 = pts[pts.length - 1].x;
        const grad = ctx.createLinearGradient(x0, 0, x1, 0);
        dataset.data.forEach((d, i) => {
          const t = (pts[i].x - x0) / (x1 - x0 || 1);
          grad.addColorStop(Math.max(0, Math.min(1, t)), glucoseColor(d.y));
        });

        // Draw one continuous bezier path through all points
        function drawPath() {
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 0; i < pts.length - 1; i++) {
            const p0 = pts[i], p1 = pts[i + 1];
            const cp2x = p0.cp2 != null ? p0.cp2.x : p0.cp2x;
            const cp2y = p0.cp2 != null ? p0.cp2.y : p0.cp2y;
            const cp1x = p1.cp1 != null ? p1.cp1.x : p1.cp1x;
            const cp1y = p1.cp1 != null ? p1.cp1.y : p1.cp1y;
            if (cp2x != null && cp1x != null) {
              ctx.bezierCurveTo(cp2x, cp2y, cp1x, cp1y, p1.x, p1.y);
            } else {
              ctx.lineTo(p1.x, p1.y);
            }
          }
        }

        ctx.save();
        // Clip to chart area so glow doesn't bleed into axes/labels
        const a = chart.chartArea;
        ctx.beginPath();
        ctx.rect(a.left, a.top, a.right - a.left, a.bottom - a.top);
        ctx.clip();

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = grad;

        // Three passes: wide halo → mid bloom → tight bright core
        ctx.filter = 'blur(22px)';  ctx.lineWidth = 18; ctx.globalAlpha = 0.55; drawPath(); ctx.stroke();
        ctx.filter = 'blur(10px)';  ctx.lineWidth = 9;  ctx.globalAlpha = 0.75; drawPath(); ctx.stroke();
        ctx.filter = 'blur(3px)';   ctx.lineWidth = 4;  ctx.globalAlpha = 0.95; drawPath(); ctx.stroke();

        ctx.restore();
      }
    };

    Chart.defaults.elements.point.radius = 0;

    Chart.Tooltip.positioners.aboveBelow = function(elements, eventPosition) {
      if (!elements.length) return false;
      const { top, bottom } = this.chart.chartArea;
      const midY = (top + bottom) / 2;
      const pointY = elements[0].element.y;
      if (pointY <= midY) {
        return { x: eventPosition.x, y: Math.min(pointY + 30, bottom - 5), xAlign: 'center', yAlign: 'top' };
      } else {
        return { x: eventPosition.x, y: Math.max(pointY - 30, top + 5), xAlign: 'center', yAlign: 'bottom' };
      }
    };

    Chart.register(glowPlugin);

    const yScaleConfig = (position, drawGrid) => ({
      position,
      min: 38,
      max: 410,
      afterBuildTicks(axis) {
        axis.ticks = GRID_VALUES.map(v => ({ value: v }));
      },
      ticks: {
        font: { family: "'Space Grotesk', sans-serif", weight: '700', size: 11 },
        color: (ctx) => glucoseColor(ctx.tick.value),
        padding: 8,
      },
      grid: {
        drawOnChartArea: drawGrid,
        color: (ctx) => glucoseColorAlpha(ctx.tick.value, 0.2),
        lineWidth: 1,
      },
      border: { display: false },
    });

    const chartInstance = new Chart(document.getElementById('glucoseChart'), {
      type: 'line',
      data: {
        datasets: [{
          data: [],
          tension: 0.4,
          fill: false,
          borderWidth: 2.5,
          pointRadius: 0,
          pointHoverRadius: 6,
          pointBackgroundColor: [],
          pointBorderColor: 'transparent',
          pointHoverBorderColor: 'rgba(255,255,255,0.6)',
          pointHoverBorderWidth: 2,
          segment: {
            borderColor: (ctx) => glucoseColor(ctx.p0.parsed.y),
          },
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400 },
        elements: {
          point: { radius: 0, hoverRadius: 0 },
        },
        interaction: {
          mode: 'index',
          intersect: false,
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            position: 'aboveBelow',
            backgroundColor: 'rgba(13,22,33,0.9)',
            borderColor: 'rgba(105,246,184,0.15)',
            borderWidth: 1,
            titleFont: { family: "'Space Grotesk', sans-serif", weight: '700' },
            bodyFont: { family: "'Manrope', sans-serif" },
            callbacks: {
              title: (items) => {
                const ts = items[0].parsed.x;
                return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              },
              label: (item) => ` ${Math.round(item.parsed.y)} mg/dL`,
              labelColor: (item) => ({
                borderColor: 'transparent',
                backgroundColor: glucoseColor(item.parsed.y),
              }),
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: {
              unit: 'minute',
              displayFormats: { minute: 'HH:mm' },
              tooltipFormat: 'HH:mm',
            },
            ticks: {
              font: { family: "'Space Grotesk', sans-serif", weight: '700', size: 11 },
              color: 'rgba(148,163,184,0.5)',
              maxTicksLimit: 8,
              maxRotation: 0,
            },
            grid: {
              color: 'rgba(255,255,255,0.04)',
            },
            border: { display: false },
          },
          y: yScaleConfig('left', true),
          y1: yScaleConfig('right', false),
        },
      },
    });

    // ─── DOM references ──────────────────────────────────────────────────────────

    const elSgv        = document.getElementById('sgv-value');
    const elArrow      = document.getElementById('trend-arrow');
    const elLabel      = document.getElementById('trend-label');
    const elUpdated    = document.getElementById('last-updated');
    const elStale      = document.getElementById('stale-badge');
    const elTirValue   = document.getElementById('tir-value');
    const elTirBar     = document.getElementById('tir-bar');
    const elTirPeriod  = document.getElementById('tir-period');

    // ─── UI Update Functions ─────────────────────────────────────────────────────

    function updateCurrentReading(entry) {
      if (!entry) return;
      const color = glucoseColor(entry.sgv);
      elSgv.textContent = entry.sgv;
      elSgv.style.color = color;
      elSgv.style.filter = `drop-shadow(0 0 30px ${color})`;

      const trend = TREND_MAP[entry.direction] || TREND_FALLBACK;
      elArrow.textContent = trend.arrow;
      elArrow.style.color = color;
      elLabel.textContent = trend.label;

      const ageMs = Date.now() - entry.date;
      const ageMin = Math.floor(ageMs / 60000);
      elUpdated.textContent = ageMin < 1 ? 'Just now' : `${ageMin} min ago`;

      const isStale = ageMs > 15 * 60 * 1000;
      elStale.classList.toggle('visible', isStale);
    }

    function updateChart(entries) {
      const data = entries.map(e => ({ x: e.date, y: e.sgv }));
      const colors = entries.map(e => glucoseColor(e.sgv));
      const ds = chartInstance.data.datasets[0];
      ds.data = data;
      ds.pointBackgroundColor = colors;
      ds.pointRadius = 0;
      ds.pointHoverRadius = 6;
      chartInstance.update();
      // Reset the lightning cycle so the next shot fires 600ms from now
      scheduleLightning(600);
    }

    function updateTIR(entries, periodHours) {
      const pct = calculateTIR(entries);
      if (pct === null) {
        elTirValue.textContent = '--%';
        elTirBar.style.backgroundImage = '';
        elTirBar.style.backgroundColor = '#1e293b';
        ['label-lo','label-hi','tir-range-bg'].forEach(id =>
          document.getElementById(id).style.display = 'none'
        );
        return;
      }
      const color = tirColor(pct);
      elTirValue.textContent = `${pct}%`;
      elTirValue.style.color = color;
      elTirPeriod.textContent = `Last ${periodHours}h`;

      // Sort all readings low→high and build a gradient showing the full distribution
      const sorted = [...entries].sort((a, b) => a.sgv - b.sgv);
      const n = sorted.length;
      const stops = sorted.map((e, i) => {
        const pos = n === 1 ? 50 : (i / (n - 1)) * 100;
        return `${glucoseColor(e.sgv)} ${pos.toFixed(1)}%`;
      });
      elTirBar.style.backgroundImage = `linear-gradient(to right, ${stops.join(', ')})`;
      elTirBar.style.backgroundColor = '';
      elTirBar.style.boxShadow = `0 0 20px ${color}55`;

      // Position labels and backing bar
      const labelLo = document.getElementById('label-lo');
      const labelHi = document.getElementById('label-hi');
      const rangeBg = document.getElementById('tir-range-bg');
      const belowLo = sorted.filter(e => e.sgv < 70).length;
      const aboveHi = sorted.filter(e => e.sgv > 180).length;
      const d = Math.max(n - 1, 1);
      const loLeft = belowLo === 0 ? 0 : (belowLo / d) * 100;
      const hiLeft = aboveHi === 0 ? 100 : ((n - aboveHi) / d) * 100;

      // Labels: show only when TIR > 0% (a meaningful in-range zone exists)
      if (pct > 0) {
        labelLo.style.left = loLeft.toFixed(1) + '%';
        labelHi.style.left = Math.min(hiLeft, 100).toFixed(1) + '%';
        labelLo.style.display = '';
        labelHi.style.display = '';
      } else {
        labelLo.style.display = 'none';
        labelHi.style.display = 'none';
      }

      // Backing bar spans the in-range zone; hidden only if TIR is 0%
      if (pct > 0 && hiLeft > loLeft) {
        rangeBg.style.left    = loLeft.toFixed(1) + '%';
        rangeBg.style.width   = (Math.min(hiLeft, 100) - loLeft).toFixed(1) + '%';
        rangeBg.style.display = '';
      } else {
        rangeBg.style.display = 'none';
      }
    }

    // ─── Lightning Effect ────────────────────────────────────────────────────────

    const ovCanvas = document.getElementById('lightning-overlay');
    const ovCtx = ovCanvas.getContext('2d');
    let boltRaf = null;

    function syncOverlay() {
      const gc = document.getElementById('glucoseChart');
      const parentEl = document.getElementById('chart-card');
      const gcRect = gc.getBoundingClientRect();
      const parentRect = parentEl.getBoundingClientRect();
      // Use CSS pixel dimensions — meta.data coordinates are in CSS pixels, not device pixels
      ovCanvas.width = Math.round(gcRect.width);
      ovCanvas.height = Math.round(gcRect.height);
      ovCanvas.style.left = Math.round(gcRect.left - parentRect.left) + 'px';
      ovCanvas.style.top = Math.round(gcRect.top - parentRect.top) + 'px';
      ovCanvas.style.width = Math.round(gcRect.width) + 'px';
      ovCanvas.style.height = Math.round(gcRect.height) + 'px';
    }

    function buildPathSamples(numPts) {
      const meta = chartInstance.getDatasetMeta(0);
      const pts = meta.data;
      if (!pts || pts.length < 2) return [];
      const segsPerPair = Math.max(3, Math.ceil(numPts / (pts.length - 1)));
      const samples = [];
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i], p1 = pts[i + 1];
        const cp2x = (p0.cp2 != null ? p0.cp2.x : p0.cp2x) ?? p0.x;
        const cp2y = (p0.cp2 != null ? p0.cp2.y : p0.cp2y) ?? p0.y;
        const cp1x = (p1.cp1 != null ? p1.cp1.x : p1.cp1x) ?? p1.x;
        const cp1y = (p1.cp1 != null ? p1.cp1.y : p1.cp1y) ?? p1.y;
        for (let j = 0; j < segsPerPair; j++) {
          const t = j / segsPerPair;
          const mt = 1 - t;
          samples.push({
            x: mt*mt*mt*p0.x + 3*mt*mt*t*cp2x + 3*mt*t*t*cp1x + t*t*t*p1.x,
            y: mt*mt*mt*p0.y + 3*mt*mt*t*cp2y + 3*mt*t*t*cp1y + t*t*t*p1.y,
          });
        }
      }
      const last = pts[pts.length - 1];
      samples.push({ x: last.x, y: last.y });
      return samples;
    }

    function fireLightning() {
      if (!chartInstance.data.datasets[0].data.length) return;
      syncOverlay();
      const path = buildPathSamples(500);
      if (path.length < 10) return;

      // Pre-compute perpendicular jitter for each point (electricity feel)
      const jitter = path.map((pt, i) => {
        if (i === 0 || i === path.length - 1) return { x: 0, y: 0 };
        const prev = path[i - 1], next = path[i + 1];
        const dx = next.x - prev.x, dy = next.y - prev.y;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const mag = (Math.random() - 0.5) * 5;
        return { x: (-dy / len) * mag, y: (dx / len) * mag };
      });

      const tailLen = 85;
      const speed = 7;
      let headIdx = 0;

      if (boltRaf) cancelAnimationFrame(boltRaf);

      function frame() {
        ovCtx.clearRect(0, 0, ovCanvas.width, ovCanvas.height);
        headIdx += speed;

        if (headIdx - tailLen >= path.length) {
          ovCtx.clearRect(0, 0, ovCanvas.width, ovCanvas.height);
          return;
        }

        const segStart = Math.max(0, headIdx - tailLen);
        const segEnd = Math.min(headIdx, path.length - 1);

        if (segStart < segEnd) {
          const tailPt = path[segStart];
          const headPt = path[segEnd];

          // Build the jittered path function
          function tracePath() {
            ovCtx.beginPath();
            ovCtx.moveTo(path[segStart].x + jitter[segStart].x, path[segStart].y + jitter[segStart].y);
            for (let i = segStart + 1; i <= segEnd; i++) {
              ovCtx.lineTo(path[i].x + jitter[i].x, path[i].y + jitter[i].y);
            }
          }

          const grad = ovCtx.createLinearGradient(tailPt.x, tailPt.y, headPt.x, headPt.y);
          grad.addColorStop(0,   'rgba(150, 255, 215, 0)');
          grad.addColorStop(0.4, 'rgba(180, 255, 230, 0.3)');
          grad.addColorStop(1,   'rgba(230, 255, 250, 0.95)');

          ovCtx.save();
          ovCtx.lineCap = 'round';
          ovCtx.lineJoin = 'round';

          // Wide glow halo
          ovCtx.filter = 'blur(7px)';
          ovCtx.globalAlpha = 0.6;
          tracePath();
          ovCtx.strokeStyle = 'rgba(160, 255, 220, 0.7)';
          ovCtx.lineWidth = 8;
          ovCtx.stroke();

          // Tight bright core
          ovCtx.filter = 'blur(1.5px)';
          ovCtx.globalAlpha = 1;
          tracePath();
          ovCtx.strokeStyle = grad;
          ovCtx.lineWidth = 1.8;
          ovCtx.stroke();

          ovCtx.restore();

          // Glowing head orb
          const grd = ovCtx.createRadialGradient(headPt.x, headPt.y, 0, headPt.x, headPt.y, 16);
          grd.addColorStop(0,   'rgba(240, 255, 255, 0.9)');
          grd.addColorStop(0.35,'rgba(180, 255, 230, 0.55)');
          grd.addColorStop(1,   'rgba(160, 255, 220, 0)');
          ovCtx.beginPath();
          ovCtx.arc(headPt.x, headPt.y, 16, 0, Math.PI * 2);
          ovCtx.fillStyle = grd;
          ovCtx.fill();

          ovCtx.beginPath();
          ovCtx.arc(headPt.x, headPt.y, 2.5, 0, Math.PI * 2);
          ovCtx.fillStyle = 'rgba(255, 255, 255, 0.98)';
          ovCtx.fill();
        }

        boltRaf = requestAnimationFrame(frame);
      }

      frame();
    }

    // Single-chain timer — each fire schedules the next, so updateChart resets the cycle cleanly
    let lightningTimer = null;
    function scheduleLightning(delay) {
      if (lightningTimer) clearTimeout(lightningTimer);
      lightningTimer = setTimeout(() => {
        fireLightning();
        scheduleLightning(8000);
      }, delay);
    }

    // ─── Data Fetching ───────────────────────────────────────────────────────────

    let currentPeriodHours = 3;
    let refreshTimer = null;

    async function fetchData(periodHours) {
      try {
        const startISO = new Date(Date.now() - periodHours * 3600 * 1000).toISOString();
        const count = periodHours * 12 + 10;
        const url = `/api/proxy?find[dateString][$gte]=${encodeURIComponent(startISO)}&count=${count}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const raw = await resp.json();
        const entries = raw
          .map(e => {
            if (e.sgv === 'Low'  || e.sgv === 39) return { ...e, sgv: 40 };
            if (e.sgv === 'High' || e.sgv === 401) return { ...e, sgv: 400 };
            return e;
          })
          .filter(e => typeof e.sgv === 'number' && e.sgv > 0)
          .sort((a, b) => a.date - b.date);

        if (!entries.length) return;

        updateCurrentReading(entries[entries.length - 1]);
        updateChart(entries);
        updateTIR(entries, periodHours);
      } catch (err) {
        console.error('Fetch error:', err);
      }
    }

    function startRefresh(periodHours) {
      clearInterval(refreshTimer);
      currentPeriodHours = periodHours;
      fetchData(periodHours);
      refreshTimer = setInterval(() => fetchData(periodHours), 60000);
    }

    // ─── Period Buttons ──────────────────────────────────────────────────────────

    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        startRefresh(parseInt(btn.dataset.hours, 10));
      });
    });

    // ─── Window resize fallback ──────────────────────────────────────────────────

    window.addEventListener('resize', () => chartInstance.resize());

    // ─── Init ────────────────────────────────────────────────────────────────────

    startRefresh(currentPeriodHours);
  </script>
</body>
</html>
